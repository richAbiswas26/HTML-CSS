<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Card Hover Effect</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <img src="assets/img1.jpg" alt="img" class="blackImg">

                <div class="colorImg">
                    <img src="assets/img1.jpg" alt="img" >
                </div>

                <div class="info">
                    <h2>Richa Biswas</h2>
                    <p>Actress</p>

                    <div class="social-links">
                        <a href="https://instagram.com">
                            <i class="fa-brands fa-instagram"></i>
                        </a>
                        <a href="https://facebook.com">
                            <i class="fa-brands fa-youtube"></i>
                        </a>
                        <a href="https://facebook.com">
                            <i class="fa-brands fa-linkedin-in"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="col">
                <img src="assets/img2.png" alt="img" class="blackImg">

                <div class="colorImg">
                    <img src="assets/img2.png" alt="img" >
                </div>

                <div class="info">
                    <h2>Richa Biswas</h2>
                    <p>Software Engineer at Microsoft</p>

                    <div class="social-links">
                        <a href="https://instagram.com">
                            <i class="fa-brands fa-instagram"></i>
                        </a>
                        <a href="https://facebook.com">
                            <i class="fa-brands fa-youtube"></i>
                        </a>
                        <a href="https://facebook.com">
                            <i class="fa-brands fa-linkedin-in"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="col">
                <img src="assets/img3.png" alt="img" class="blackImg">

                <div class="colorImg">
                    <img src="assets/img3.png" alt="img" >
                </div>

                <div class="info">
                    <h2>Richa Biswas</h2>
                    <p>Full-Stack Developer at Google</p>

                    <div class="social-links">
                        <a href="https://instagram.com">
                            <i class="fa-brands fa-instagram"></i>
                        </a>
                        <a href="https://facebook.com">
                            <i class="fa-brands fa-youtube"></i>
                        </a>
                        <a href="https://facebook.com">
                            <i class="fa-brands fa-linkedin-in"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
